<!DOCTYPE html>
<html lang="en">

<head>
    <script>document.write('<base href="'+ (window.location.hostname === 'olafjanssen.github.io' ? '/ttpotm/' : '/') + '">');</script>
    <title>
        TTPotM - {{ title }}
    </title>
    <meta name="description" content="{{ description }}">

    <meta property="og:title" content="{{ title }}">
    <meta property="og:type" content="article">
    <meta property="og:image" content="{{url}}img/{{ thumb }}">
    <meta property="og:site_name" content="TTPotM">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:url" content="{{ url }}{{ path }}/">

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content=@nullelement" />
    <meta name="twitter:title" content="{{ title }}" />
    <meta name="twitter:description" content="{{ description }}" />
    <meta name="twitter:image" content="{{url}}img/{{ thumb }}" />

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="canonical" href="{{ url }}{{ path }}/" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-iphone.png" />

    <link rel="stylesheet" href="css/boilerpuddy.css">

    <link rel="stylesheet" type="text/css" href="css/portal.css">
</head>

<body class="typeset">
    <div class="container">
        <div class="jumbotron row p-3 p-md-5 text-dark rounded bg-transparent" id="main-jumbo">
            <div class="col-md-6 px-0">
                <a href=""><img src="img/ttpotm.png" class="img-fluid" alt="TTPotM Collective"></a>
            </div>
            <div class="col-md-6 px-0 align-self-center">
                <div class="game-card-img">
                    <div class="game-3d">
                    <div class="game-3d__inner">
                        <img class="game-3d__cover" src="{{ cover }}" alt="{{ title }}">
                    </div>
                    </div>
                </div>
            </div>
        </div>

        <main role="main" class="container">
            <div class="row">
                <div class="col-md-8 content-main">
                    {{{contents}}}
                </div>

                <aside class="col-md-4 blog-sidebar">
                    <h3>Screenshots</h3>
                    {{#each screenshots}}
                    <img src="img/game/{{ this }}" alt="game screenshot" class="img-thumbnail">
                    {{/each}}
                </aside>
            </div>

            </aside>
    </div>

    </main>

</html>
