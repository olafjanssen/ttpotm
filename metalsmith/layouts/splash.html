<!doctype html>
<html lang="en">
    <head>
        <script>
            document.write(
                '<base href="' +
                    (window.location.hostname === "olafjanssen.github.io"
                        ? "/ttpotm/"
                        : "/") +
                    '">',
            );
        </script>
        <title>TTPotM - {{ title }}</title>
        <meta name="description" content="{{ description }}" />

        <meta property="og:title" content="{{ title }}" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="{{url}}img/logo-01.png" />
        <meta property="og:site_name" content="TTPotM" />
        <meta property="og:description" content="{{ description }}" />
        <meta property="og:url" content="{{ url }}{{ path }}/" />

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="canonical" href="{{ url }}{{ path }}/" />
        <link rel="shortcut icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/apple-touch-iphone.png" />
        <link rel="stylesheet" type="text/css" href="/css/boilerpuddy.css" />
        <link rel="stylesheet" type="text/css" href="/css/portal.css" />
        <script
            data-goatcounter="https://snorfeld.goatcounter.com/count"
            async
            src="//gc.zgo.at/count.js"
        ></script>
    </head>

    <body class="typeset">
        <div class="container">
            <div
                class="jumbotron row p-3 p-md-5 text-dark rounded bg-transparent"
                id="main-jumbo"
            >
                <div class="col-md-6 offset-md-3 px-0">
                    <img src="/img/ttpotm.png" class="img-fluid" alt="TTPotM" />
                </div>
                <div
                    class="col-md-6 offset-md-3 px-0 align-self-center text-center"
                >
                    <p>{{{contents}}}</p>
                </div>
            </div>
        </div>
    </body>
</html>
