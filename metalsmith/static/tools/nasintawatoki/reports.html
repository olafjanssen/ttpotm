    let corpus = [];

    Helper.Data.loadJSON('./data/tp_verses.json').then(function (data) {
        data.verses.forEach(function (verse) {
            let words = verse.toki.split(/[^0-9a-zA-Z]+/);
            verse.tokens = words.slice(0, words.length - 1);
            verse.lemmas = Helper.Collections.Set.fromArray(verse.tokens);
        });
        corpus = data;


        reportData.forEach(function (report) {
            console.log(report, report.id);

            let verse = corpus.verses.filter(function (v) {
                return v.id == report.id;
            })[0];


            console.log(verse);

            let rep = Helper.DOM.createElements({
                tag: 'tr',
                children: [
                    {
                        tag: 'td',
                        innerHTML: '<a href="https://tatoeba.org/eng/sentences/show/' + verse.id + '" target="_blank">' + verse.id + '</a>'
                    },
                    {tag: 'td', innerHTML: verse.eng},
                    {tag: 'td', innerHTML: verse.toki},
                    {tag: 'td', innerHTML: report.msg},
                ]
            });

            document.getElementById('reports').appendChild(rep.root);
        });

        console.log(corpus);

        // find doubles
        let doubleSet = {};
        corpus.verses.forEach(function(verse){
            if (doubleSet[verse.eng]){
                return;
            }

            let doubles = corpus.verses.filter(function(v){
              return v.eng === verse.eng;
           });

           if (doubles.length>1) {
               doubleSet[verse.eng] = true;
               console.log(doubles);

               let rep = Helper.DOM.createElements({
                   tag: 'tr',
                   children: [
                       {
                           tag: 'td',
                           innerHTML: '<a href="https://tatoeba.org/eng/sentences/show/' + verse.id + '" target="_blank">' + verse.id + '</a>'
                       },
                       {tag: 'td', innerHTML: verse.eng},
                       {tag: 'td', innerHTML: doubles.map(function(v){return v.toki;}).join('<br>')},
                   ]
               });

               document.getElementById('doubles').appendChild(rep.root);

           }
        });

    });
